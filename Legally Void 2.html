<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legally Void: Scenarios</title>
    <style>
        :root {
            --primary: #6366f1; --danger: #ef4444; --success: #22c55e;
            --bg: #0f172a; --paper: #ffffff; --ink: #1e293b;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg); color: #f8fafc;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }

        .stats-bar {
            display: flex; justify-content: space-between; width: 100%;
            max-width: 500px; background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 15px;
        }

        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); }

        .progress-bg { 
            width: 100%; max-width: 500px; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 20px; 
        }
        #progress-fill { background: var(--success); width: 0%; height: 100%; transition: 0.3s; }

        .contract-paper {
            background: var(--paper); color: var(--ink); padding: 40px;
            border-radius: 2px; width: 100%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 1.8; font-size: 15px;
        }

        .factor { cursor: pointer; transition: 0.3s; border-bottom: 1px transparent dotted; }
        .factor:hover { border-bottom: 1px solid #cbd5e1; }
        .failed { background-color: #fee2e2 !important; color: var(--danger) !important; font-weight: bold; }
        .solved { background-color: #dcfce7 !important; color: #166534 !important; text-decoration: line-through; pointer-events: none; }

        #game-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }

        .modal-content {
            background: white; color: var(--ink); padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center;
        }

        .choice-btn {
            display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        #end-screen { display: none; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="stats-bar">
        <div class="stat-box">Time: <span id="timer-val" class="stat-value">60</span></div>
        <div id="scenario-name" style="font-weight:bold; color: #94a3b8;">Loading...</div>
        <div class="stat-box">Score: <span id="score-val" class="stat-value">0</span></div>
    </div>

    <div class="progress-bg"><div id="progress-fill"></div></div>

    <div class="contract-paper" id="contract-content">
        <!-- Content injected by JS -->
    </div>
</div>

<div id="end-screen">
    <h1 id="end-title">RESULTS</h1>
    <p id="end-subtitle"></p>
    <button style="padding: 15px; cursor: pointer" onclick="location.reload()">NEXT CASE</button>
</div>

<div id="game-modal">
    <div class="modal-content">
        <h4 id="q-text">Legal Analysis:</h4>
        <div id="options"></div>
    </div>
</div>

<script>
    const scenarios = [
        {
            title: "EMPLOYMENT OFFER",
            html: `I, the Applicant, agree to work 100 hours a week for <span class="factor" data-id="e1">no monetary wages</span>. 
            I am signing this because the Manager <span class="factor" data-id="e2">locked the door and won't let me leave</span>. 
            I also agree to participate in the company's <span class="factor" data-id="e3">unlicensed organ brokerage</span>. 
            I acknowledge I am <span class="factor" data-id="e4">only 12 years old</span> and this is fine.`,
            logic: {
                "e1": { q: "Working for zero pay is...", options: ["Lack of Consideration", "A Great Deal", "Standard Salary"], correct: "Lack of Consideration" },
                "e2": { q: "Locked doors imply...", options: ["Duress", "Motivation", "Hospitality"], correct: "Duress" },
                "e3": { q: "Organ brokerage is...", options: ["Illegal Content", "Medical Benefit", "A Side Hustle"], correct: "Illegal Content" },
                "e4": { q: "A 12-year-old signing has...", options: ["Incapacity", "Early Ambition", "Full Authority"], correct: "Incapacity" }
            }
        },
        {
            title: "REAL ESTATE DEED",
            html: `The Seller agrees to sell the 'Moon' to the Buyer. The Seller <span class="factor" data-id="r1">claims they own the Moon</span> (they do not). 
            The Buyer is currently <span class="factor" data-id="r2">suffering from advanced dementia</span> and doesn't know where they are. 
            The Seller told the Buyer if they don't sign, they will <span class="factor" data-id="r3">burn down the Buyer's actual house</span>. 
            Additionally, the contract is <span class="factor" data-id="r4">written in disappearing ink</span> to hide terms.`,
            logic: {
                "r1": { q: "Claiming to own the moon is...", options: ["Fraud/Misrepresentation", "Marketing", "Ambition"], correct: "Fraud/Misrepresentation" },
                "r2": { q: "Dementia leads to...", options: ["Incapacity", "Wisdom", "Total Consent"], correct: "Incapacity" },
                "r3": { q: "Threatening arson is...", options: ["Duress", "Negotiation", "Urgency"], correct: "Duress" },
                "r4": { q: "Disappearing ink suggests...", options: ["Unconscionability", "Magic", "Creative Design"], correct: "Unconscionability" }
            }
        }
    ];

    let score = 0; let timeLeft = 60; let foundCount = 0;
    let gameActive = true; let currentScenario = null;

    function initGame() {
        currentScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
        document.getElementById('scenario-name').innerText = currentScenario.title;
        document.getElementById('contract-content').innerHTML = currentScenario.html;
        
        document.querySelectorAll('.factor').forEach(f => {
            f.addEventListener('click', () => {
                if (!gameActive || f.classList.contains('solved')) return;
                openQuiz(f);
            });
        });
    }

    function openQuiz(el) {
        const id = el.getAttribute('data-id');
        const info = currentScenario.logic[id];
        const optBox = document.getElementById('options');
        document.getElementById('q-text').innerText = info.q;
        optBox.innerHTML = '';

        [...info.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn'; btn.innerText = opt;
            btn.onclick = () => {
                if (opt === info.correct) {
                    score += 1000; foundCount++;
                    el.classList.remove('failed'); el.classList.add('solved');
                    updateProgress();
                    document.getElementById('game-modal').style.display = 'none';
                    if (foundCount === 4) endGame("CASE CLOSED!");
                } else {
                    timeLeft -= 10; el.classList.add('failed');
                    document.getElementById('game-modal').style.display = 'none';
                }
            };
            optBox.appendChild(btn);
        });
        document.getElementById('game-modal').style.display = 'flex';
    }

    function updateProgress() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('progress-fill').style.width = (foundCount / 4 * 100) + "%";
    }

    function endGame(msg) {
        gameActive = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('end-title').innerText = msg;
        document.getElementById('end-subtitle').innerText = `Total Score: ${score}`;
    }

    setInterval(() => {
        if (!gameActive) return;
        timeLeft--; document.getElementById('timer-val').innerText = timeLeft;
        if (timeLeft <= 0) endGame("OUT OF TIME");
    }, 1000);

    initGame();
</script>
</body>
</html>
