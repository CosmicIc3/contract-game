<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legally Void</title>
    <style>
        :root { --primary: #6366f1; --danger: #ef4444; --success: #22c55e; --bg: #0f172a; --paper: #ffffff; --ink: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: #f8fafc; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 450px; background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); display: block; text-align: center; }
        .progress-bg { width: 100%; max-width: 450px; height: 10px; background: #334155; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        .contract-paper { background: var(--paper); color: var(--ink); padding: 30px; border-radius: 4px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 1.7; font-size: 16px; min-height: 250px; box-sizing: border-box; }
        .factor { cursor: pointer; border-bottom: 1px dashed #ccc; -webkit-tap-highlight-color: rgba(99, 102, 241, 0.2); }
        .failed { background-color: #fee2e2; color: var(--danger); border-bottom: 2px solid var(--danger); }
        .solved { background-color: #dcfce7; color: #166534; text-decoration: line-through; pointer-events: none; }
        #game-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; color: var(--ink); padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .choice-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: bold; font-size: 16px; background: #fff; cursor: pointer; }
        #end-screen { display: none; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stats-bar">
            <div>TIME <span id="timer-val" class="stat-value">60</span></div>
            <div id="scenario-name" style="color:#94a3b8; font-size:12px; padding-top:5px">LOADING...</div>
            <div>SCORE <span id="score-val" class="stat-value">0</span></div>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div class="contract-paper" id="contract-content">Initializing...</div>
    </div>

    <div id="end-screen">
        <h1 id="end-title">CASE RESOLVED</h1>
        <p id="end-subtitle"></p>
        <button id="next-btn" class="choice-btn" style="background:var(--primary); color:white">NEXT CASE</button>
    </div>

    <div id="game-modal">
        <div class="modal-content">
            <h3 id="q-text">Legal Flaw:</h3>
            <div id="options"></div>
        </div>
    </div>

    <script>
    (function() {
        const scenarios = [
            {
                title: "SHADY EMPLOYMENT",
                html: `I agree to work for <span class="factor" data-id="1">zero wages</span>. I signed because the manager <span class="factor" data-id="2">held me at gunpoint</span>. I will assist in <span class="factor" data-id="3">laundering money</span>. Note: I am <span class="factor" data-id="4">only 11 years old</span>.`,
                logic: {
                    "1": { q: "No exchange of value is...", options: ["Lack of Consideration", "Fair", "Pro-Bono"], correct: "Lack of Consideration" },
                    "2": { q: "Physical violence is...", options: ["Duress", "Pressure", "Standard"], correct: "Duress" },
                    "3": { q: "Laundering makes this...", options: ["Illegal Object", "Profitable", "Valid"], correct: "Illegal Object" },
                    "4": { q: "Being a minor means...", options: ["Incapacity", "Early Start", "Rights"], correct: "Incapacity" }
                }
            },
            {
                title: "TECH TOS SCAM",
                html: `The User agrees that this app <span class="factor" data-id="5">claims to cure cancer</span>. The terms were <span class="factor" data-id="6">hidden in 1pt font</span>. The User was <span class="factor" data-id="7">hypnotized</span> during signup. If the User leaves, the dev will <span class="factor" data-id="8">leak their private medical files</span>.`,
                logic: {
                    "5": { q: "Curing cancer (a lie) is...", options: ["Fraud/Misrepresentation", "Marketing", "Visionary"], correct: "Fraud/Misrepresentation" },
                    "6": { q: "Hidden/unfair terms are...", options: ["Unconscionability", "Standard", "Efficient"], correct: "Unconscionability" },
                    "7": { q: "Hypnosis removes...", options: ["Genuineness of Consent", "Boredom", "Privacy"], correct: "Genuineness of Consent" },
                    "8": { q: "Threatening a leak is...", options: ["Undue Influence/Duress", "Privacy Policy", "A Warning"], correct: "Undue Influence/Duress" }
                }
            },
            {
                title: "ESTATE SALE",
                html: `The Seller is <span class="factor" data-id="9">severely intoxicated</span>. They are selling a <span class="factor" data-id="10">protected national monument</span>. The buyer is the Seller's <span class="factor" data-id="11">trusted doctor who pressured them</span>. Both parties <span class="factor" data-id="12">mistook the house for a different one</span>.`,
                logic: {
                    "9": { q: "Intoxication causes...", options: ["Incapacity", "Confidence", "Transparency"], correct: "Incapacity" },
                    "10": { q: "Monuments are...", options: ["Not Legally Saleable", "Expensive", "Valid Goods"], correct: "Not Legally Saleable" },
                    "11": { q: "Trust-based pressure is...", options: ["Undue Influence", "Good Advice", "Salesmanship"], correct: "Undue Influence" },
                    "12": { q: "Both being wrong is...", options: ["Mutual Mistake", "Typo", "Coincidence"], correct: "Mutual Mistake" }
                }
            }
        ];

        let score = 0, timeLeft = 60, foundCount = 0, gameActive = false, clock;

        function init() {
            gameActive = true; timeLeft = 60; foundCount = 0;
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('progress-fill').style.width = '0%';
            
            const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
            document.getElementById('contract-content').innerHTML = scenario.html;
            document.getElementById('scenario-name').innerText = scenario.title;
            document.getElementById('timer-val').innerText = timeLeft;

            if (clock) clearInterval(clock);
            clock = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById('timer-val').innerText = timeLeft;
                if (timeLeft <= 0) endGame("TIME EXPIRED");
            }, 1000);

            document.getElementById('contract-content').onclick = (e) => {
                if (e.target.classList.contains('factor') && !e.target.classList.contains('solved')) {
                    const info = scenario.logic[e.target.getAttribute('data-id')];
                    showModal(e.target, info);
                }
            };
        }

        function showModal(el, info) {
            const modal = document.getElementById('game-modal');
            const optBox = document.getElementById('options');
            document.getElementById('q-text').innerText = info.q;
            optBox.innerHTML = '';
            modal.style.display = 'flex';

            [...info.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === info.correct) {
                        score += 500; foundCount++;
                        el.className = 'factor solved';
                        document.getElementById('progress-fill').style.width = (foundCount / 4 * 100) + "%";
                        document.getElementById('score-val').innerText = score;
                        modal.style.display = 'none';
                        if (foundCount === 4) endGame("CONTRACT NULLIFIED");
                    } else {
                        timeLeft -= 10;
                        el.className = 'factor failed';
                        modal.style.display = 'none';
                    }
                };
                optBox.appendChild(btn);
            });
        }

        function endGame(msg) {
            gameActive = false;
            clearInterval(clock);
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            document.getElementById('end-title').innerText = msg;
            document.getElementById('end-subtitle').innerText = "Total Score: " + score;
        }

        document.getElementById('next-btn').onclick = init;
        
        window.onload = init;
    })();
    </script>
</body>
</html>
