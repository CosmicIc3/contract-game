<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Legally Void: Level 10</title>
    <style>
        :root { --primary: #6366f1; --danger: #ef4444; --success: #22c55e; --bg: #0f172a; --paper: #ffffff; --ink: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: #f8fafc; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 550px; background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); display: block; text-align: center; }
        .progress-bg { width: 100%; max-width: 550px; height: 12px; background: #334155; border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }
        .contract-paper { background: var(--paper); color: var(--ink); padding: 35px; border-radius: 4px; width: 100%; max-width: 550px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 1.8; font-size: 15px; box-sizing: border-box; }
        .factor { cursor: pointer; border-bottom: 1px dashed #cbd5e1; -webkit-tap-highlight-color: rgba(99, 102, 241, 0.2); transition: 0.2s; }
        .failed { background-color: #fee2e2; color: var(--danger); border-bottom: 2px solid var(--danger); }
        .solved { background-color: #dcfce7; color: #166534; text-decoration: line-through; pointer-events: none; }
        #game-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; color: var(--ink); padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-weight: bold; font-size: 14px; background: #fff; cursor: pointer; }
        #end-screen { display: none; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="stats-bar">
            <div>TIME <span id="timer-val" class="stat-value">120</span></div>
            <div id="scenario-name" style="color:#94a3b8; font-size:12px; padding-top:5px">MEGA AUDIT</div>
            <div>SCORE <span id="score-val" class="stat-value">0</span></div>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div class="contract-paper" id="contract-content">Initializing Document...</div>
    </div>

    <div id="end-screen">
        <h1 id="end-title">AUDIT COMPLETE</h1>
        <p id="end-subtitle"></p>
        <button id="next-btn" class="choice-btn" style="background:var(--primary); color:white">RESET CASE</button>
    </div>

    <div id="game-modal">
        <div class="modal-content">
            <h3 id="q-text" style="margin-top:0">Identify Legal Error:</h3>
            <div id="options"></div>
        </div>
    </div>

<script>
(function() {
    // 10 Distinct Factors mapped to IDs
    const megaScenario = {
        title: "THE ULTIMATE VOIDABLE DEED",
        html: `This Agreement is signed by Party A, who is <span class="factor" data-id="1">currently 9 years old</span>. 
        Party A agrees to sell their soul for <span class="factor" data-id="2">absolutely no payment</span>. 
        The signing took place while Party B <span class="factor" data-id="3">pointed a loaded crossbow</span> at Party A. 
        Party A was also <span class="factor" data-id="4">under a heavy dose of sleeping pills</span>. 
        Party B claimed the document was a <span class="factor" data-id="5">birthday card</span>, which was a lie. 
        The contract requires Party A to <span class="factor" data-id="6">steal a car</span> every Tuesday. 
        There is a clause <span class="factor" data-id="7">hidden in microscopic 0.5pt text</span> that grants Party B all future children. 
        Party B is Party A's <span class="factor" data-id="8">trusted priest who used religious fear</span> to force the deal. 
        Both parties <span class="factor" data-id="9">thought they were selling a cat</span>, but the paper says 'House'. 
        Finally, the contract forbids Party A from <span class="factor" data-id="10">ever getting married</span> to anyone.`,
        
        logic: {
            "1": { q: "The signer is 9. Issue?", options: ["Incapacity (Minor)", "Legality", "Mistake"], correct: "Incapacity (Minor)" },
            "2": { q: "No payment or value exchanged?", options: ["Lack of Consideration", "A Gift", "Standard Clause"], correct: "Lack of Consideration" },
            "3": { q: "The crossbow threat is...", options: ["Duress", "Negotiation", "Undue Influence"], correct: "Duress" },
            "4": { q: "Signing while drugged is...", options: ["Incapacity (Intoxication)", "Relaxation", "Consent"], correct: "Incapacity (Intoxication)" },
            "5": { q: "Lying about what the document is?", options: ["Fraud in the Factum", "A Joke", "Technicality"], correct: "Fraud in the Factum" },
            "6": { q: "Stealing cars makes the contract...", options: ["Illegal Object", "Valid", "Profitable"], correct: "Illegal Object" },
            "7": { q: "Hidden, shockingly unfair terms?", options: ["Unconscionability", "Efficiency", "Small Print"], correct: "Unconscionability" },
            "8": { q: "Abusing a position of trust?", options: ["Undue Influence", "Good Advice", "Duress"], correct: "Undue Influence" },
            "9": { q: "Both were wrong about the item?", options: ["Mutual Mistake", "Typo", "Fraud"], correct: "Mutual Mistake" },
            "10": { q: "Restricting marriage rights is...", options: ["Violation of Public Policy", "Legal Safety", "User Setting"], correct: "Violation of Public Policy" }
        }
    };

    let score = 0, timeLeft = 120, foundCount = 0, gameActive = false, clock;

    function init() {
        gameActive = true; timeLeft = 120; foundCount = 0;
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('progress-fill').style.width = '0%';
        document.getElementById('score-val').innerText = score;
        
        document.getElementById('contract-content').innerHTML = megaScenario.html;
        document.getElementById('scenario-name').innerText = megaScenario.title;

        if (clock) clearInterval(clock);
        clock = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            document.getElementById('timer-val').innerText = timeLeft;
            if (timeLeft <= 0) endGame("TIME'S UP!");
        }, 1000);

        document.getElementById('contract-content').onclick = (e) => {
            if (e.target.classList.contains('factor') && !e.target.classList.contains('solved')) {
                const info = megaScenario.logic[e.target.getAttribute('data-id')];
                showModal(e.target, info);
            }
        };
    }

    function showModal(el, info) {
        const modal = document.getElementById('game-modal');
        const optBox = document.getElementById('options');
        document.getElementById('q-text').innerText = info.q;
        optBox.innerHTML = '';
        modal.style.display = 'flex';

        [...info.options].sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if (opt === info.correct) {
                    score += 1000; foundCount++;
                    el.className = 'factor solved';
                    document.getElementById('progress-fill').style.width = (foundCount / 10 * 100) + "%";
                    document.getElementById('score-val').innerText = score;
                    modal.style.display = 'none';
                    if (foundCount === 10) endGame("LAW MASTER!");
                } else {
                    timeLeft -= 15;
                    el.className = 'factor failed';
                    modal.style.display = 'none';
                    alert("Wrong! -15 Seconds Penalty!");
                }
            };
            optBox.appendChild(btn);
        });
    }

    function endGame(msg) {
        gameActive = false;
        clearInterval(clock);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('end-title').innerText = msg;
        document.getElementById('end-subtitle').innerText = "Final Score: " + score;
    }

    document.getElementById('next-btn').onclick = init;
    window.onload = init;
})();
</script>
</body>
</html>
