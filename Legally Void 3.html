<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Legally Void</title>
    <style>
        :root {
            --primary: #6366f1; --danger: #ef4444; --success: #22c55e;
            --bg: #0f172a; --paper: #ffffff; --ink: #1e293b;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg); color: #f8fafc;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .stats-bar {
            display: flex; justify-content: space-between; width: 95%;
            max-width: 500px; background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 10px;
            box-sizing: border-box;
        }

        .stat-box { text-align: center; }
        .stat-value { font-size: 18px; font-weight: bold; color: var(--primary); display: block; }

        .progress-bg { 
            width: 95%; max-width: 500px; height: 8px; background: #334155; border-radius: 4px; margin-bottom: 15px; 
        }
        #progress-fill { background: var(--success); width: 0%; height: 100%; transition: 0.3s; }

        .contract-paper {
            background: var(--paper); color: var(--ink); padding: 25px;
            border-radius: 2px; width: 90%; max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 1.6; font-size: 14px;
            min-height: 300px; box-sizing: border-box;
        }

        /* Mobile Tap Targets */
        .factor { 
            cursor: pointer; 
            padding: 2px 0;
            border-bottom: 1px dashed transparent;
            -webkit-tap-highlight-color: transparent; 
        }
        
        .failed { background-color: #fee2e2 !important; color: var(--danger) !important; border-bottom-color: var(--danger) !important; }
        .solved { background-color: #dcfce7 !important; color: #166534 !important; text-decoration: line-through; pointer-events: none; }

        /* Modal Overlay */
        #game-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-content {
            background: white; color: var(--ink); padding: 20px; border-radius: 12px; width: 85%; max-width: 320px;
        }

        .choice-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        #end-screen { display: none; text-align: center; padding-top: 50px; }
        .btn-restart { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="stats-bar">
        <div class="stat-box">Time<span id="timer-val" class="stat-value">60</span></div>
        <div id="scenario-name" style="font-size: 12px; align-self: center; color: #94a3b8;">AUDIT IN PROGRESS</div>
        <div class="stat-box">Score<span id="score-val" class="stat-value">0</span></div>
    </div>

    <div class="progress-bg"><div id="progress-fill"></div></div>

    <div class="contract-paper" id="contract-content">
        <!-- Content will be injected here -->
    </div>
</div>

<div id="end-screen">
    <h1 id="end-title">RESULTS</h1>
    <p id="end-subtitle"></p>
    <button class="btn-restart" onclick="location.reload()">NEXT CASE</button>
</div>

<div id="game-modal">
    <div class="modal-content">
        <h4 id="q-text" style="margin-top:0">Analysis:</h4>
        <div id="options"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const scenarios = [
        {
            title: "EMPLOYMENT OFFER",
            html: `I, the Applicant, agree to work 100 hours a week for <span class="factor" data-id="e1">no monetary wages</span>. The Manager <span class="factor" data-id="e2">locked the door</span> until I signed. I agree to participate in <span class="factor" data-id="e3">unlicensed organ brokerage</span>. I am <span class="factor" data-id="e4">only 12 years old</span>.`,
            logic: {
                "e1": { q: "Zero pay is...", options: ["Lack of Consideration", "A Gift", "Standard"], correct: "Lack of Consideration" },
                "e2": { q: "Locked doors mean...", options: ["Duress", "Motivation", "Hospitality"], correct: "Duress" },
                "e3": { q: "Organ brokerage is...", options: ["Illegal", "A Bonus", "Medical"], correct: "Illegal" },
                "e4": { q: "A 12-year-old has...", options: ["Incapacity", "Early Ambition", "Full Rights"], correct: "Incapacity" }
            }
        },
        {
            title: "REAL ESTATE DEED",
            html: `The Seller <span class="factor" data-id="r1">claims they own the Moon</span>. The Buyer is <span class="factor" data-id="r2">suffering from dementia</span>. The Seller will <span class="factor" data-id="r3">burn down the house</span> if I don't sign. The contract is <span class="factor" data-id="r4">written in disappearing ink</span>.`,
            logic: {
                "r1": { q: "Selling the moon is...", options: ["Fraud", "Marketing", "Dreaming"], correct: "Fraud" },
                "r2": { q: "Dementia leads to...", options: ["Incapacity", "Wisdom", "Consent"], correct: "Incapacity" },
                "r3": { q: "Threatening arson is...", options: ["Duress", "Urgency", "Salesmanship"], correct: "Duress" },
                "r4": { q: "Invisible ink is...", options: ["Unconscionable", "Cool", "Standard"], correct: "Unconscionable" }
            }
        }
    ];

    let score = 0, timeLeft = 60, foundCount = 0, gameActive = true;
    const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
    
    // Injections
    document.getElementById('scenario-name').innerText = scenario.title;
    document.getElementById('contract-content').innerHTML = scenario.html;

    function endGame(msg) {
        gameActive = false;
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('end-title').innerText = msg;
        document.getElementById('end-subtitle').innerText = `Score: ${score}`;
    }

    const timer = setInterval(() => {
        if (!gameActive) return;
        timeLeft--;
        document.getElementById('timer-val').innerText = timeLeft;
        if (timeLeft <= 0) endGame("OUT OF TIME");
    }, 1000);

    // Event Delegation for Mobile
    document.getElementById('contract-content').addEventListener('click', (e) => {
        if (e.target.classList.contains('factor') && gameActive && !e.target.classList.contains('solved')) {
            const el = e.target;
            const info = scenario.logic[el.getAttribute('data-id')];
            const optBox = document.getElementById('options');
            
            document.getElementById('q-text').innerText = info.q;
            optBox.innerHTML = '';

            [...info.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === info.correct) {
                        score += 1000; foundCount++;
                        el.classList.replace('failed', 'solved') || el.classList.add('solved');
                        document.getElementById('progress-fill').style.width = (foundCount / 4 * 100) + "%";
                        document.getElementById('score-val').innerText = score;
                        document.getElementById('game-modal').style.display = 'none';
                        if (foundCount === 4) endGame("CONTRACT VOIDED!");
                    } else {
                        timeLeft -= 10; el.classList.add('failed');
                        document.getElementById('game-modal').style.display = 'none';
                    }
                };
                optBox.appendChild(btn);
            });
            document.getElementById('game-modal').style.display = 'flex';
        }
    });
});
</script>
</body>
</html>
